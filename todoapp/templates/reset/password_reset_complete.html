{% extends 'todoapp/base.html' %}

{% block content %}
<div class="auth-container text-center">
    <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
    <h2>Password Changed Successfully</h2>
    <p class="text-muted">Your password has been updated. You can now log in with your new password.</p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-3">Login</a>
</div>

<style>
.auth-container {
    max-width: 450px;
    margin: 8% auto;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    background: #ffffff;
}

.auth-container h2 {
    font-weight: 600;
    margin-bottom: 10px;
}

.auth-container p {
    font-size: 0.95rem;
    color: #6c757d;
    margin-bottom: 20px;
}

.auth-container .btn-lg {
    font-size: 1.1rem;
    padding: 12px 20px;
}
</style>
{% endblock %}
