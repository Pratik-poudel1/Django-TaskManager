{% extends 'todoapp/base.html' %}

{% block content %}
<div class="auth-container">
    <div class="text-center mb-4">
        <i class="fas fa-lock fa-3x text-primary mb-3"></i>
        <h2>Set New Password</h2>
        <p class="text-muted">Enter a strong new password to secure your account</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger">
        Please correct the errors below.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label" for="id_new_password1">New Password</label>
            <input type="password" name="new_password1" class="form-control" id="id_new_password1" placeholder="New Password" required>
        </div>

        <div class="mb-3">
            <label class="form-label" for="id_new_password2">Confirm New Password</label>
            <input type="password" name="new_password2" class="form-control" id="id_new_password2" placeholder="Confirm New Password" required>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">Change Password</button>
        </div>

        <div class="text-center">
            <a href="{% url 'login' %}" class="text-muted">
                <i class="fas fa-arrow-left me-1"></i> Back to Login
            </a>
        </div>
    </form>
</div>

<style>
.auth-container {
    max-width: 450px;
    margin: 8% auto;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    background: #ffffff;
}
.auth-container h2 {
    font-weight: 600;
    margin-bottom: 10px;
}
.auth-container p {
    font-size: 0.95rem;
    color: #6c757d;
    margin-bottom: 20px;
}
.auth-container .btn-lg {
    font-size: 1.1rem;
    padding: 12px 20px;
}
.auth-container .form-control {
    height: 45px;
}
</style>
{% endblock %}
