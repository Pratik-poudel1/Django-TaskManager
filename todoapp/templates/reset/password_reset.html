{% extends 'todoapp/base.html' %}
{% block content %}
<div class="auth-container">
    <div class="text-center mb-4">
        <i class="fas fa-unlock-alt fa-3x text-primary mb-3"></i>
        <h2>Forgot Your Password?</h2>
        <p class="text-muted">Enter your email to receive a reset link</p>
    </div>
    {% if form.errors %}
    <div class="alert alert-danger text-center">
        Please enter a valid email address.
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
        </div>
        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-envelope me-2"></i> Send Reset Link
            </button>
        </div>
        <div class="text-center mb-4">
            <p class="mb-0">
                <a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
            </p>
        </div>
    </form>
</div>
<style>
.auth-container {
    max-width: 500px;
    margin: 5% auto;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    background: #ffffff;
}
.auth-container .form-control-lg {
    padding: 12px 15px;
    font-size: 1rem;
}
.auth-container .btn-lg {
    font-size: 1.1rem;
    padding: 12px;
}
.auth-container img {
    margin-top: 20px;
}
</style>
{% endblock %}
