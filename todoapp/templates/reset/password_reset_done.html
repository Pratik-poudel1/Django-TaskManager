{% extends 'todoapp/base.html' %}

{% block content %}
<div class="auth-container text-center">
    <div class="mb-4">
        <i class="fas fa-envelope-open fa-3x text-primary mb-3"></i>
        <h2>Check Your Email</h2>
        <p class="text-muted">
            We’ve sent a password reset link to your Gmail account, if it exists in our system.
        </p>
    </div>
    
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-3">
        <i class="fas fa-arrow-left me-2"></i> Back to Login
    </a>
</div>

<style>
.auth-container {
    max-width: 500px;
    margin: 8% auto;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    background: #ffffff;
}

.auth-container h2 {
    font-weight: 600;
    margin-bottom: 15px;
}

.auth-container p {
    font-size: 0.95rem;
    line-height: 1.5;
}

.auth-container .btn-lg {
    font-size: 1.1rem;
    padding: 12px 20px;
}
</style>
{% endblock %}
