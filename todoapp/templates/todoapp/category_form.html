{% extends 'todoapp/base.html' %}

{% block content %}
<div class="container my-5">
    <!-- Gradient background -->
    <div class="p-5 rounded-5" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header text-white rounded-top-4" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);">
                <h2 class="mb-0 text-center"><i class="fas fa-folder-plus me-2"></i>Create New Category</h2>
            </div>
            <div class="card-body bg-light p-4 rounded-bottom-4">
                <form method="post">
                    {% csrf_token %}

                    <!-- Category Name -->
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-tag me-1"></i>Category Name</label>
                        <input type="text" name="name" class="form-control border-warning border-2" required placeholder="Enter category name">
                    </div>            

                    <!-- Action Buttons -->
                    <div class="d-flex justify-content-end mt-4 gap-2">
                        <a href="{% url 'category_list' %}" class="btn btn-outline-danger btn-lg">
                            <i class="fas fa-times-circle me-1"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-plus-circle me-1"></i> Create Category
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
/* Input focus effect */
input.form-control:focus {
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    border-width: 3px;
}

/* Card body subtle shadow */
.card-body {
    box-shadow: inset 0 0 30px rgba(0,0,0,0.03);
}
</style>
{% endblock %}
